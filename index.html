<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mairbek Tungaev</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c0c22, #17082e, #0a1528, #0c0c22);
            background-size: 400% 400%;
            animation: bgdrift 12s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 24px;
        }

        @keyframes bgdrift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .hero-name {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            color: #fff;
            line-height: 1.05;
            letter-spacing: -0.04em;
        }

        .accent-bar {
            width: 30px;
            height: 3px;
            background: #a855f7;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
            margin-top: 12px;
            margin-bottom: 28px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            font-weight: 600;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .tile:hover {
            border-color: rgba(168, 85, 247, 0.5);
            background: rgba(168, 85, 247, 0.08);
            transform: translateY(-2px);
        }

        .tile img,
        .tile svg {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: contain;
        }


        @media (prefers-reduced-motion: reduce) {
            body {
                animation: none;
                background-position: center;
            }
        }

        @media (min-width: 480px) {
            .icon-grid {
                gap: 14px;
            }

            .tile {
                padding: 24px 16px;
                font-size: 0.9rem;
            }

            .tile img,
            .tile svg {
                width: 48px;
                height: 48px;
            }

        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="hero-name">Mairbek<br>Tungaev</h1>
        <div class="accent-bar"></div>
        <div class="icon-grid">
            <a class="tile" href="https://github.com/mkotto" target="_blank" rel="noopener noreferrer">
                <img src="assets/githublogo.png" alt="GitHub">
                GitHub
            </a>
            <a class="tile" href="https://www.linkedin.com/in/mairbek-tungaev-50a0b157/" target="_blank" rel="noopener noreferrer">
                <img src="assets/linkedinlogo.png" alt="LinkedIn">
                LinkedIn
            </a>
            <a class="tile" href="https://www.last.fm/user/everjump" target="_blank" rel="noopener noreferrer">
                <img src="assets/lastfmlogo.png" alt="Last.fm">
                Last.fm
            </a>
            <a class="tile" href="https://steamcommunity.com/id/dewdar" target="_blank" rel="noopener noreferrer">
                <img src="assets/steamlogo.png" alt="Steam">
                Steam
            </a>
            <a class="tile" href="https://gitlab.com/mairbek" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg" aria-label="GitLab">
                    <path d="M282.83,170.73l-.27-.69-26.14-68.22a6.81,6.81,0,0,0-2.69-3.24,7,7,0,0,0-8,.43,7,7,0,0,0-2.32,3.52l-17.65,54H154.29L136.64,102.53a6.86,6.86,0,0,0-2.32-3.52,7,7,0,0,0-8-.43,6.87,6.87,0,0,0-2.69,3.24L97.44,170l-.26.69a48.54,48.54,0,0,0,16.1,56.1l.09.07.24.17,39.82,29.82,19.7,14.91,12,9.06a8.07,8.07,0,0,0,9.76,0l12-9.06,19.7-14.91,40.06-30,.1-.08A48.56,48.56,0,0,0,282.83,170.73Z" fill="#E24329"/>
                    <path d="M282.83,170.73l-.27-.69a88.3,88.3,0,0,0-35.15,19.86L190,238.25c19.55,14.79,36.57,27.64,36.57,27.64l40.06-30,.1-.08A48.56,48.56,0,0,0,282.83,170.73Z" fill="#FC6D26"/>
                    <path d="M153.43,265.89l19.7,14.91,12,9.06a8.07,8.07,0,0,0,9.76,0l12-9.06,19.7-14.91S209.55,253,190,238.25C170.45,253,153.43,265.89,153.43,265.89Z" fill="#FCA326"/>
                    <path d="M132.58,190.55A88.19,88.19,0,0,0,97.44,170l-.26.69a48.54,48.54,0,0,0,16.1,56.1l.09.07.24.17,39.82,29.82S170.45,253,190,238.25Z" fill="#FC6D26"/>
                </svg>
                GitLab
            </a>
        </div>
    </div>
</body>
</html>
