<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mairbek Tungaev</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c0c22, #17082e, #0a1528, #0c0c22);
            background-size: 400% 400%;
            animation: bgdrift 12s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 24px;
        }

        @keyframes bgdrift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .hero-name {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            color: #fff;
            line-height: 1.05;
            letter-spacing: -0.04em;
        }

        .accent-bar {
            width: 30px;
            height: 3px;
            background: #a855f7;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
            margin-top: 12px;
            margin-bottom: 28px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            font-weight: 600;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .tile:hover {
            border-color: rgba(168, 85, 247, 0.5);
            background: rgba(168, 85, 247, 0.08);
            transform: translateY(-2px);
        }

        .tile img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: contain;
        }

        @media (prefers-reduced-motion: reduce) {
            body {
                animation: none;
                background-position: center;
            }
        }

        @media (min-width: 480px) {
            .icon-grid {
                gap: 14px;
            }

            .tile {
                padding: 24px 16px;
                font-size: 0.9rem;
            }

            .tile img {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="hero-name">Mairbek<br>Tungaev</h1>
        <div class="accent-bar"></div>
        <div class="icon-grid">
            <a class="tile" href="https://github.com/mkotto" target="_blank" rel="noopener noreferrer">
                <img src="assets/githublogo.png" alt="GitHub">
                GitHub
            </a>
            <a class="tile" href="https://www.linkedin.com/in/mairbek-tungaev-50a0b157/" target="_blank" rel="noopener noreferrer">
                <img src="assets/linkedinlogo.png" alt="LinkedIn">
                LinkedIn
            </a>
            <a class="tile" href="https://www.last.fm/user/everjump" target="_blank" rel="noopener noreferrer">
                <img src="assets/lastfmlogo.png" alt="Last.fm">
                Last.fm
            </a>
            <a class="tile" href="https://steamcommunity.com/id/dewdar" target="_blank" rel="noopener noreferrer">
                <img src="assets/steamlogo.png" alt="Steam">
                Steam
            </a>
        </div>
    </div>
</body>
</html>
