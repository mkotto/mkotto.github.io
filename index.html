<!DOCTYPE html>

<head>

    <title>Mairbek Tungaev</title>
<style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;

        body {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 8vh;
            background-image: url('assets/cat-nightcity-background-clean-sky.png'), linear-gradient(135deg, #0c0c22, #17082e, #0a1528, #0c0c22);
            background-size: cover, 400% 400%;
            background-position: center, 0% 50%;
            background-attachment: fixed, initial;
            animation: bgdrift 12s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 24px;
        }

        @keyframes bgdrift {
            0%   { background-position: center, 0% 50%; }
            50%  { background-position: center, 100% 50%; }
            100% { background-position: center, 0% 50%; }
        }

        #pixel-clouds {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        @keyframes drift-left {
            from { transform: translateX(110vw); }
            to   { transform: translateX(-300px); }
        }

            position: absolute;
            left: 0;
            background: transparent;
            --cc: rgba(22, 17, 55, 0.88);
            --ch: rgba(48, 36, 90, 0.8);

            animation-delay: -40s;

        /* cloud-e: 8×3 px grid @ 5px — wispy with highlight row */
        .cloud-e {
            top: 24%;
            width: 5px;
            height: 5px;
            animation: drift-left 22s linear infinite;
            animation-delay: -8s;
            box-shadow:
                /* y=0 highlight x=1..6 */
                5px 0 0 0 var(--ch), 10px 0 0 0 var(--ch), 15px 0 0 0 var(--ch),
                20px 0 0 0 var(--ch), 25px 0 0 0 var(--ch), 30px 0 0 0 var(--ch),

        @media (prefers-reduced-motion: reduce) {
            body { animation: none; }
            .pixel-cloud { animation: none; display: none; }
        }

        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        @keyframes nameGradient {
            0%   { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes nameGlitch {
            0%, 32%, 100% {
                transform: translate(0, 0);
                filter: drop-shadow(0 0 18px rgba(168, 85, 247, 0.35));
            }
            6%  { transform: translate(-3px, 1px);  filter: blur(4px) contrast(25) brightness(1.3); }
            14% { transform: translate(3px, -1px);  filter: blur(6px) contrast(40) brightness(1.5); }
            22% { transform: translate(-1px, 0);    filter: blur(3px) contrast(20) brightness(1.2); }
        }

        @keyframes glitch-r {
            0%, 30%, 100% { clip-path: inset(0 0 100% 0); transform: translate(0); }
            6%  { clip-path: inset(18% 0 52% 0); transform: translate(-6px, 1px); }
            14% { clip-path: inset(63% 0 12% 0); transform: translate(-4px, -1px); }
            22% { clip-path: inset(38% 0 42% 0); transform: translate(-5px, 0); }
        }

        @keyframes glitch-c {
            0%, 30%, 100% { clip-path: inset(0 0 100% 0); transform: translate(0); }
            6%  { clip-path: inset(45% 0 30% 0); transform: translate(6px, -1px); }
            14% { clip-path: inset(12% 0 65% 0); transform: translate(5px, 2px); }
            22% { clip-path: inset(72% 0 8% 0); transform: translate(4px, -1px); }
        }

        .hero-name {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -0.04em;
            position: relative;
            background: linear-gradient(
                90deg,
                #38bdf8,
                #a78bfa,
                #f472b6,
                #fb923c,
                #a855f7,
                #22d3ee,
                #38bdf8
            );
            background-size: 400% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: nameGradient 18s linear infinite;
            cursor: default;
            filter: drop-shadow(0 0 18px rgba(168, 85, 247, 0.35));
            padding-bottom: 0.2em;
        }

        .hero-name::before,
        .hero-name::after {
            content: "Mairbek\ATungaev";
            white-space: pre;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
            line-height: inherit;
            letter-spacing: inherit;
            pointer-events: none;
            background: none;
        }

        .hero-name::before {
            -webkit-text-fill-color: #c084fc;
            color: #c084fc;
            clip-path: inset(0 0 100% 0);
        }

        .hero-name::after {
            -webkit-text-fill-color: #00ffee;
            color: #00ffee;
            clip-path: inset(0 0 100% 0);
        }

        .hero-name:hover {
            animation: nameGradient 18s linear infinite, nameGlitch 1.2s steps(1) infinite;
        }

        .hero-name:hover::before {
            animation: glitch-r 1.2s steps(1) infinite;
        }

        .hero-name:hover::after {
            animation: glitch-c 1.2s steps(1) infinite;
        }

        .accent-bar {
            width: 30px;
            height: 3px;
            background: #a855f7;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
            margin-top: 12px;
            margin-bottom: 28px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            font-weight: 600;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
            position: relative;
            overflow: visible;
        }

        .firefly {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            width: 4px;
            height: 4px;
            background: #c8ff80;
            box-shadow: 0 0 6px 3px rgba(180, 255, 100, 0.75);
            animation: fireflyFloat var(--dur, 1.2s) ease-out forwards;
            z-index: 10;
        }

        @keyframes fireflyFloat {
            0%   { opacity: 0;   transform: translate(0, 0) scale(1); }
            25%  { opacity: 1; }
            100% { opacity: 0;   transform: translate(var(--tx, 0px), var(--ty, -30px)) scale(0.4); }
        }

        .tile:hover {
            border-color: rgba(168, 85, 247, 0.5);
            background: rgba(168, 85, 247, 0.08);
            transform: translateY(-2px);
        }

        .tile img,
        .tile svg {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: contain;
        }

        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px 1px rgba(255, 255, 255, 0.8);
            animation: shimmer 3s infinite ease-in-out;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .bg-toggle-wrap {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        #bgToggle {
            display: none;
        }

        .bg-toggle-label {
            display: flex;
            align-items: center;
            gap: 9px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            padding: 8px 14px 8px 10px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: rgba(255, 255, 255, 0.55);
            transition: background 0.2s, border-color 0.2s;
            user-select: none;
        }

        .bg-toggle-label:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .toggle-track {
            width: 36px;
            height: 20px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            position: relative;
            flex-shrink: 0;
            transition: background 0.25s, box-shadow 0.25s;
        }

        .toggle-thumb {
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
        }

        #bgToggle:checked + .bg-toggle-label .toggle-track {
            background: #a855f7;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.45);
        }

        #bgToggle:checked + .bg-toggle-label .toggle-thumb {
            transform: translateX(16px);
        }

        body:has(#bgToggle:not(:checked)) {
            background-image: linear-gradient(135deg, #0c0c22, #17082e, #0a1528, #0c0c22);
            background-size: 400% 400%;
        }

        @media (min-width: 480px) {
            .icon-grid {
                gap: 14px;
            }

            .tile {
                padding: 24px 16px;
                font-size: 0.9rem;
            }

            .tile img,
            .tile svg {

    <script>
        function createStarfield(starCount) {
            const starfield = document.getElementById('starfield');
            if (!starfield) return;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';

                const top = Math.random() * 100;
                const left = Math.random() * 100;
                const size = Math.random() * 3 + 1;
                const delay = Math.random() * 3;
                const duration = Math.random() * 2 + 2;

                star.style.top = `${top}%`;
                star.style.left = `${left}%`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.animationDelay = `${delay}s`;
                star.style.animationDuration = `${duration}s`;

                const colorRoll = Math.random();
                if (colorRoll < 0.05) {
                    star.style.backgroundColor = '#E2F6FF';
                    star.style.boxShadow = '0 0 8px 1px rgba(226, 246, 255, 0.8)';
                } else if (colorRoll < 0.10) {
                    star.style.backgroundColor = '#FFF4E8';
                    star.style.boxShadow = '0 0 8px 1px rgba(255, 244, 232, 0.8)';
                }

                starfield.appendChild(star);
            }
        }

        createStarfield(100);

        document.getElementById('bgToggle').addEventListener('change', () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const t = ctx.currentTime;

            // warm mid-tone body — short sine, no sub-bass
            const osc = ctx.createOscillator();
            const oscGain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(480, t);
            osc.frequency.exponentialRampToValueAtTime(200, t + 0.025);
            oscGain.gain.setValueAtTime(0.22, t);
            oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.045);
            osc.connect(oscGain);
            oscGain.connect(ctx.destination);
            osc.start(t);
            osc.stop(t + 0.05);

            // crisp click transient — bandpass noise
            const bufLen = Math.floor(ctx.sampleRate * 0.006);
            const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufLen; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 2);
            }
            const src = ctx.createBufferSource();
            src.buffer = buf;
            const filter = ctx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 3000;
            filter.Q.value = 1.2;
            const clickGain = ctx.createGain();
            clickGain.gain.setValueAtTime(0.25, t);
            src.connect(filter);
            filter.connect(clickGain);
            clickGain.connect(ctx.destination);
            src.start(t);
        });

        document.querySelectorAll('.tile').forEach(tile => {
            let spawnInterval = null;

            function spawnFirefly() {
                const ff = document.createElement('div');
                ff.className = 'firefly';

                const w = tile.offsetWidth;
                const h = tile.offsetHeight;
                ff.style.left = (Math.random() * w) + 'px';
                ff.style.top  = (Math.random() * h) + 'px';

                const angle = Math.random() * 2 * Math.PI;
                const dist  = 20 + Math.random() * 40;
                ff.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                ff.style.setProperty('--ty', Math.sin(angle) * dist - 10 + 'px');
                ff.style.setProperty('--dur', (0.9 + Math.random() * 0.8) + 's');

                tile.appendChild(ff);
                ff.addEventListener('animationend', () => ff.remove());
            }

            tile.addEventListener('mouseenter', () => {
                spawnFirefly();
                spawnInterval = setInterval(spawnFirefly, 120);
            });

            tile.addEventListener('mouseleave', () => {
                clearInterval(spawnInterval);
                spawnInterval = null;
            });
        });
    </script>
