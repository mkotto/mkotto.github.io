<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mairbek Tungaev</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 8vh;
            background-image: url('assets/cat-nightcity-background-clean-sky.png'), linear-gradient(135deg, #0c0c22, #17082e, #0a1528, #0c0c22);
            background-size: cover, 400% 400%;
            background-position: center, 0% 50%;
            background-attachment: fixed, initial;
            animation: bgdrift 12s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 24px;
        }

        @keyframes bgdrift {
            0%   { background-position: center, 0% 50%; }
            50%  { background-position: center, 100% 50%; }
            100% { background-position: center, 0% 50%; }
        }

        @media (prefers-reduced-motion: reduce) {
            body { animation: none; }
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .hero-name {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            color: #fff;
            line-height: 1.05;
            letter-spacing: -0.04em;
        }

        .accent-bar {
            width: 30px;
            height: 3px;
            background: #a855f7;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
            margin-top: 12px;
            margin-bottom: 28px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            font-weight: 600;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .tile:hover {
            border-color: rgba(168, 85, 247, 0.5);
            background: rgba(168, 85, 247, 0.08);
            transform: translateY(-2px);
        }

        .tile img,
        .tile svg {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: contain;
        }


        .bg-toggle-wrap {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        #bgToggle {
            display: none;
        }

        .bg-toggle-label {
            display: flex;
            align-items: center;
            gap: 9px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            padding: 8px 14px 8px 10px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: rgba(255, 255, 255, 0.55);
            transition: background 0.2s, border-color 0.2s;
            user-select: none;
        }

        .bg-toggle-label:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .toggle-track {
            width: 36px;
            height: 20px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            position: relative;
            flex-shrink: 0;
            transition: background 0.25s, box-shadow 0.25s;
        }

        .toggle-thumb {
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
        }

        #bgToggle:checked + .bg-toggle-label .toggle-track {
            background: #a855f7;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.45);
        }

        #bgToggle:checked + .bg-toggle-label .toggle-thumb {
            transform: translateX(16px);
        }

        body:has(#bgToggle:not(:checked)) {
            background-image: linear-gradient(135deg, #0c0c22, #17082e, #0a1528, #0c0c22);
            background-size: 400% 400%;
        }

        @media (min-width: 480px) {
            .icon-grid {
                gap: 14px;
            }

            .tile {
                padding: 24px 16px;
                font-size: 0.9rem;
            }

            .tile img,
            .tile svg {
                width: 48px;
                height: 48px;
            }

        }
    </style>
</head>
